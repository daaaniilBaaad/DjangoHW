{% extends "catalog/base.html" %}
{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">Блог</h1>
    <a class="btn btn-primary mb-3" href="{% url 'blog:blogpost_create' %}">Создать пост</a>
    <ul class="list-group">
        {% for post in posts %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                <a href="{% url 'blog:blogpost_detail' post.pk %}">{{ post.title }}</a>
                <span class="badge bg-secondary rounded-pill">Просмотров: {{ post.views }}</span>
            </li>
        {% empty %}
            <li class="list-group-item">Пока нет опубликованных постов.</li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
